name: Release Plugin

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: mkdir -p dist

      - name: Build plugin
        run: |
          npm run build:illustrator
          cd packages/illustrator
          zip -r ../../dist/dither-illustrator-${{ github.ref_name }}.ccx manifest.json index.html main.js icons/ -x 'src/*'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/dither-illustrator-${{ github.ref_name }}.ccx
