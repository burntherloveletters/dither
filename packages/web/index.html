<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dither — Vector Dither Tool</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 280px;
  --bg: #121214;
  --surface: #1a1a1e;
  --surface2: #222226;
  --border: #2a2a2e;
  --text: #e4e4e7;
  --text-dim: #8b8b8e;
  --accent: #7c6cf0;
  --accent-hover: #6b5ce0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  font-size: 13px;
}

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.sidebar-section {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-section h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

label.control {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

label.control span {
  font-size: 12px;
  color: var(--text-dim);
}

select, input[type="number"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  outline: none;
}

select { width: 130px; cursor: pointer; }
select:focus, input:focus { border-color: var(--accent); }

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  outline: none;
  margin: 4px 0;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.slider-row span:first-child {
  font-size: 12px;
  color: var(--text-dim);
  min-width: 60px;
}

.slider-row input[type="range"] { flex: 1; }

.slider-row .slider-val {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 28px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.palette-entry {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.palette-entry input[type="color"] {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0;
  cursor: pointer;
  background: none;
}

.palette-entry input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
.palette-entry input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

.palette-entry input[type="text"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
  width: 68px;
}

.palette-entry input[type="range"] { flex: 1; }

.palette-entry .pct-val {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 30px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.preset-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.preset-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 3px 8px;
  border-radius: 3px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}

.preset-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}

.btn {
  display: block;
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 6px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover { background: #2a2a2e; }

.canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: #0e0e10;
}

.canvas-area canvas {
  max-width: 100%;
  max-height: 100%;
  image-rendering: pixelated;
}

.drop-zone {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: var(--text-dim);
  pointer-events: none;
}

.drop-zone.has-image { display: none; }

.drop-zone-icon {
  width: 48px;
  height: 48px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.drag-over {
  background: rgba(124, 108, 240, 0.05);
  outline: 2px dashed var(--accent);
  outline-offset: -8px;
}

.hidden { display: none !important; }

.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 8px 0 6px;
  color: var(--text-dim);
  font-size: 11px;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">Dither</div>

  <div class="sidebar-section">
    <h3>Source</h3>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <button class="btn btn-secondary" id="loadBtn">Load Image</button>
    <div class="divider">
      <div class="divider-line"></div>
      <span>or generate</span>
      <div class="divider-line"></div>
    </div>
    <label class="control">
      <span>Gradient</span>
      <select id="gradientType">
        <option value="linear-h">Linear H</option>
        <option value="linear-v">Linear V</option>
        <option value="diagonal">Diagonal</option>
        <option value="radial">Radial</option>
        <option value="conic">Conic</option>
        <option value="noise">Noise</option>
      </select>
    </label>
    <div class="slider-row">
      <span>Size</span>
      <input type="range" id="gradientSize" min="128" max="1024" step="64" value="512">
      <span class="slider-val" id="gradientSizeVal">512</span>
    </div>
    <button class="btn btn-secondary" id="generateBtn">Generate Gradient</button>
  </div>

  <div class="sidebar-section">
    <h3>Pattern</h3>
    <label class="control">
      <span>Type</span>
      <select id="patternType">
        <option value="bayer2">Bayer 2x2</option>
        <option value="bayer4" selected>Bayer 4x4</option>
        <option value="bayer8">Bayer 8x8</option>
        <option value="halftone">Halftone</option>
        <option value="lines">Lines</option>
        <option value="crosses">Crosses</option>
        <option value="dots">Dots</option>
        <option value="grid">Grid</option>
        <option value="scales">Scales</option>
      </select>
    </label>
    <label class="control">
      <span>Mode</span>
      <select id="ditherMode">
        <option value="image" selected>Image</option>
        <option value="linear">Linear</option>
        <option value="radial">Radial</option>
      </select>
    </label>
    <label class="control">
      <span>Style</span>
      <select id="ditherStyle">
        <option value="threshold" selected>Threshold</option>
        <option value="scaled">Scaled</option>
      </select>
    </label>
    <label class="control">
      <span>Shape</span>
      <select id="shapeType">
        <option value="circle">Circle</option>
        <option value="square" selected>Square</option>
        <option value="diamond">Diamond</option>
      </select>
    </label>
  </div>

  <div class="sidebar-section">
    <h3>Parameters</h3>
    <div class="slider-row">
      <span>Cell Size</span>
      <input type="range" id="cellSize" min="2" max="32" value="8">
      <span class="slider-val" id="cellSizeVal">8</span>
    </div>
    <div class="slider-row" id="angleRow">
      <span>Angle</span>
      <input type="range" id="angle" min="0" max="360" value="45">
      <span class="slider-val" id="angleVal">45°</span>
    </div>
    <div class="slider-row" id="scaleRow">
      <span>Scale</span>
      <input type="range" id="scale" min="25" max="200" value="100">
      <span class="slider-val" id="scaleVal">1.0</span>
    </div>
    <div class="slider-row" id="offsetXRow">
      <span>Offset X</span>
      <input type="range" id="offsetX" min="-100" max="100" value="0">
      <span class="slider-val" id="offsetXVal">0</span>
    </div>
    <div class="slider-row" id="offsetYRow">
      <span>Offset Y</span>
      <input type="range" id="offsetY" min="-100" max="100" value="0">
      <span class="slider-val" id="offsetYVal">0</span>
    </div>
  </div>

  <div class="sidebar-section">
    <h3>Palette</h3>
    <label class="control">
      <span>Colors</span>
      <select id="colorCount">
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </label>
    <div id="paletteEntries"></div>
    <div class="preset-row">
      <button class="preset-btn" data-preset="bw">B/W</button>
      <button class="preset-btn" data-preset="gameboy">GameBoy</button>
      <button class="preset-btn" data-preset="cga">CGA</button>
      <button class="preset-btn" data-preset="sepia">Sepia</button>
    </div>
  </div>

  <div class="sidebar-section">
    <h3>Export</h3>
    <button class="btn btn-primary" id="exportSvg">Export SVG</button>
    <button class="btn btn-secondary" id="exportPng">Export PNG</button>
  </div>
</aside>

<main class="canvas-area" id="canvasArea">
  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">+</div>
    <div>Drop an image or click Load Image</div>
  </div>
  <canvas id="preview" style="display:none"></canvas>
</main>

<script type="module" src="app.js"></script>
</body>
</html>
